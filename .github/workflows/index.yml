name: Auto Indexing
on: [push]

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install google-api-python-client oauth2client requests

      - name: Submit to Google
        env:
          GOOGLE_JSON_KEY: ${{ secrets.GOOGLE_JSON_KEY }}
        run: |
          echo "$GOOGLE_JSON_KEY" > service-account.json
          python3 -c "
          import requests
          import xml.etree.ElementTree as ET
          from googleapiclient.discovery import build
          from oauth2client.service_account import ServiceAccountCredentials

          # --- 这里修改为你的 sitemap 地址 ---
          sitemap_url = 'https://www.skipbinhirerockhampton.com/sitemap.xml'

          # 获取并解析 sitemap
          response = requests.get(sitemap_url)
          root = ET.fromstring(response.content)
          # 获取所有 loc 标签里的链接
          urls = [loc.text for loc in root.findall('.//{http://www.sitemaps.org/schemas/sitemap/0.9}loc')]

          creds = ServiceAccountCredentials.from_json_keyfile_name('service-account.json', ['https://www.googleapis.com/auth/indexing'])
          service = build('indexing', 'v3', credentials=creds)

          for url in urls:
              print(f'正在提交: {url}')
              try:
                  service.urlNotifications().publish(body={'url': url, 'type': 'URL_UPDATED'}).execute()
              except Exception as e:
                  print(f'提交失败 {url}: {e}')
          "
